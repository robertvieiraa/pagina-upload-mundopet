<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MundoPet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside>
        <img src="imagens/Logo.svg">
        <nav>
            <ul class="lista-links">
                <li><a href="#">Publicar</a></li>
                <li>
                    <a href="#">
                        <img src="imagens/feed.svg">
                        <p>Feed</p>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="imagens/cat.svg">
                        <p>Perfil</p>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="imagens/info.svg">
                        <p>Sobre nós</p>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="imagens/logout.svg">
                        <p>Sair</p>
                    </a>
                </li>
            </ul>
        </nav>
    </aside>
    <main>
        <div class="container-upload-imagem">
            <div class="container-imagem">
                <img src="imagens/gato-laranja.jpg" class="main-imagem">
            </div>
            <button id="upload-btn">Carregar imagem</button>
            <input type="file" accept="image/" id="image-upload" style="display: none;">
            <div class="container-nome-imagem">
                <p>imagem_do_gato.png</p>
                <img src="imagens/close.svg" width="12px">
            </div>
        </div>
        <div class="container-informacoes">
            <h2>Nova foto</h2>
            <form>
                <div>
                    <label for="nome">Título da foto</label>
                    <input type="text" name="nome" id="nome">
                </div>
                <div>
                    <label for="descricao">Descrição</label>
                    <textarea name="descricao" id="descricao"></textarea>
                </div>
                <div>
                    <label for="categorias">Hashtags</label>
                    <input type="text" name="categorias" id="categorias">
                </div>
                <ul class="tags">
                    <li>
                        <p>Gato laranja</p>
                        <img src="imagens/close-black.svg" width="10px">
                    </li>
                </ul>
                <div class="container-botoes">
                    <button class="botao-descartar">Descartar</button>
                    <button class="botao-publicar">Publicar</button>
                </div>
            </form>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
